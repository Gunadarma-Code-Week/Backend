version: "3.8"

services:
  adminer:
    image: adminer
    environment:
      - ADMINER_DESIGN=pepa-linha
    command: php -S 0.0.0.0:8080 -t /var/www/html
    ports:
      - "0.0.0.0:8081:8080"
    depends_on:
      db:
        condition: service_healthy
    
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - db-data:/var/lib/postgresql/data
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: golang:1.23
    restart: unless-stopped
    working_dir: /src
    volumes:
      - ./:/src
    environment:
      ENVIRONMENT: ${ENVIRONMENT}
      VERSION: ${VERSION}
      APP_NAME: ${APP_NAME}
      PORT: ${PORT}
      MODE: ${MODE}
      HOST_HEADER: ${HOST_HEADER}
      CORS_ORIGIN: ${CORS_ORIGIN}
      DB_CONNECTION: ${DB_CONNECTION}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      API_BASE_URL: ${API_BASE_URL}
      ADMIN_API_BASE_URL: ${ADMIN_API_BASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ISSUER: ${JWT_ISSUER}
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_USERNAME: ${EMAIL_USERNAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
      EMAIL_FROM: ${EMAIL_FROM}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID} p
      DOMJUDGE_URL: ${DOMJUDGE_URL}
      DOMJUDGE_CONTEST_ID: ${DOMJUDGE_CONTEST_ID}
      DOMJUDGE_USERNAME: ${DOMJUDGE_USERNAME}
      DOMJUDGE_PASSWORD: ${DOMJUDGE_PASSWORD}
      MIDTRANS_SERVER_KEY: ${MIDTRANS_SERVER_KEY}
      MIDTRANS_CLIENT_KEY: ${MIDTRANS_CLIENT_KEY}
      MIDTRANS_ENVIRONMENT: ${MIDTRANS_ENVIRONMENT}

    command: /bin/sh -c "go mod download && CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o /src/gcw main.go && /src/gcw"
    # ports:
    #   - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  db-data:
    driver: local

# Notes:
# - Dokploy clones the repo before running docker-compose; this compose expects the repo files present (build: .)
# - Copy `.env.example` to `.env` and set real secrets before deploy.
# - For production set ENVIRONMENT=production and secure secrets via Dokploy secrets or an external secrets manager.
