basePath: /api/v1/gcw/resources
definitions:
  dto.AdminAddParticipantRequest:
    properties:
      user_id:
        example: 1
        type: integer
    required:
    - user_id
    type: object
  dto.AdminAddParticipantResponse:
    properties:
      id_tiket:
        example: SEM20241201ABC123
        type: string
      message:
        example: Berhasil menambahkan participant ke seminar
        type: string
      seminar_id:
        example: 1
        type: integer
      status:
        example: success
        type: string
      user:
        $ref: '#/definitions/dto.UserInfo'
    type: object
  dto.AdminUpdateUserDTO:
    properties:
      birth_date:
        type: string
      birth_place:
        type: string
      data_has_verified:
        type: boolean
      dokumen_filename:
        type: string
      email:
        type: string
      gender:
        type: string
      institusi:
        type: string
      jenjang:
        type: string
      major:
        type: string
      name:
        type: string
      nim:
        type: string
      phone:
        type: string
      profile_has_updated:
        type: boolean
      profile_picture:
        type: string
      role:
        enum:
        - user
        - admin
        - superadmin
        type: string
      soc_med_document:
        type: string
    type: object
  dto.AdminUserResponseDTO:
    properties:
      birth_date:
        type: string
      birth_place:
        type: string
      created_at:
        type: string
      data_has_verified:
        type: boolean
      dokumen_filename:
        type: string
      email:
        type: string
      gender:
        type: string
      id:
        type: integer
      id_team:
        type: integer
      institusi:
        type: string
      jenjang:
        type: string
      major:
        type: string
      name:
        type: string
      nim:
        type: string
      phone:
        type: string
      profile_has_updated:
        type: boolean
      profile_picture:
        type: string
      role:
        type: string
      soc_med_document:
        type: string
      updated_at:
        type: string
    type: object
  dto.AdminUsersListResponseDTO:
    properties:
      meta:
        $ref: '#/definitions/dto.AdminUsersMetaDTO'
      users:
        items:
          $ref: '#/definitions/dto.AdminUserResponseDTO'
        type: array
    type: object
  dto.AdminUsersMetaDTO:
    properties:
      currentPage:
        type: integer
      hasMore:
        type: boolean
      limit:
        type: integer
      totalItems:
        type: integer
      totalPages:
        type: integer
    type: object
  dto.AuthResponseDTO:
    properties:
      access_token:
        type: string
      refresh_token:
        type: string
      user:
        $ref: '#/definitions/dto.UserResponseDTO'
    type: object
  dto.CpDetailDto:
    properties:
      domjudgePassword:
        type: string
      domjudgeUsername:
        type: string
      stage:
        type: string
      status:
        type: string
    type: object
  dto.CreateNewsLetterDTO:
    properties:
      base_image:
        type: string
      id_admin:
        type: integer
      news_letter:
        type: string
      title:
        type: string
    required:
    - id_admin
    - news_letter
    - title
    type: object
  dto.Event:
    properties:
      name:
        type: string
      status:
        type: string
      ticket:
        $ref: '#/definitions/dto.Ticket'
    type: object
  dto.HackatonStageStatus:
    properties:
      final:
        type: boolean
      final_url:
        type: string
      stage_1:
        type: boolean
      stage_1_url:
        type: string
      stage_2:
        type: boolean
      stage_2_url:
        type: string
    type: object
  dto.JoinSeminarResponse:
    properties:
      id_tiket:
        example: TICKET123456
        type: string
      message:
        example: Berhasil bergabung ke seminar
        type: string
      seminar_id:
        example: 1
        type: integer
      status:
        example: success
        type: string
    type: object
  dto.LoginDTO:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.Member:
    properties:
      email:
        type: string
      name:
        type: string
      role:
        type: string
    type: object
  dto.RefreshTokenDTO:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  dto.RegisterDTO:
    properties:
      email:
        type: string
      name:
        minLength: 3
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  dto.RegistraionTeamResponse:
    properties:
      bukti_pembayaran:
        type: string
      created_at:
        type: string
      id_team:
        type: integer
      leader:
        $ref: '#/definitions/dto.Member'
      member:
        items:
          $ref: '#/definitions/dto.Member'
        type: array
      supervisor:
        type: string
      supervisor_nidn:
        type: string
      team_name:
        type: string
      updated_at:
        type: string
    required:
    - supervisor
    - supervisor_nidn
    - team_name
    type: object
  dto.RegistrationCPResponse:
    properties:
      bukti_pembayaran:
        type: string
      createdAt:
        type: string
      domjudge_password:
        type: string
      domjudge_username:
        type: string
      id_cp_team:
        type: integer
      id_team:
        type: integer
      join_code:
        type: string
      stage:
        type: string
      status:
        type: string
      updatedAt:
        type: string
    type: object
  dto.RegistrationCPTeamRequest:
    properties:
      bukti_pembayaran:
        type: string
      supervisor:
        type: string
      supervisor_nidn:
        type: string
      team_name:
        type: string
    required:
    - supervisor
    - supervisor_nidn
    - team_name
    type: object
  dto.RegistrationCPTeamResponse:
    properties:
      cpteam:
        $ref: '#/definitions/dto.RegistrationCPResponse'
      team:
        $ref: '#/definitions/dto.RegistraionTeamResponse'
    type: object
  dto.RegistrationHackathonResponse:
    properties:
      bukti_pembayaran:
        type: string
      created_at:
        type: string
      id_HackathonTeam:
        type: integer
      id_team:
        type: integer
      join_code:
        type: string
      stage:
        type: string
      status:
        type: string
      updated_at:
        type: string
    type: object
  dto.RegistrationHackathonTeamRequest:
    properties:
      bukti_pembayaran:
        type: string
      supervisor:
        type: string
      supervisor_nidn:
        type: string
      team_name:
        type: string
    required:
    - supervisor
    - supervisor_nidn
    - team_name
    type: object
  dto.RegistrationHackathonTeamResponse:
    properties:
      hackathonTeam:
        $ref: '#/definitions/dto.RegistrationHackathonResponse'
      team:
        $ref: '#/definitions/dto.RegistraionTeamResponse'
    type: object
  dto.RequestHackathon:
    properties:
      link_drive:
        type: string
    type: object
  dto.ResponseEvents:
    properties:
      events:
        items:
          $ref: '#/definitions/dto.Event'
        type: array
      id_team:
        type: string
      user:
        $ref: '#/definitions/dto.User'
    type: object
  dto.SeminarTicketDetail:
    properties:
      created_at:
        type: string
      id_seminar:
        type: integer
      id_tiket:
        type: string
      payment_status:
        type: string
      updated_at:
        type: string
      user:
        $ref: '#/definitions/dto.UserInfo'
    type: object
  dto.Ticket:
    properties:
      issued_at:
        type: string
      qr_code_url:
        type: string
      ticket_id:
        type: string
      type:
        type: string
      valid_until:
        type: string
    type: object
  dto.UpdateNewsLetterDTO:
    properties:
      base_image:
        type: string
      news_letter:
        type: string
      title:
        type: string
    type: object
  dto.UpdateUserProfileDTO:
    properties:
      birth_date:
        type: string
      birth_place:
        type: string
      gender:
        type: string
      institusi:
        type: string
      major:
        type: string
      name:
        type: string
      nim:
        type: string
      phone:
        type: string
      socmed_document:
        type: string
    required:
    - birth_date
    - birth_place
    - gender
    - institusi
    - name
    - nim
    type: object
  dto.User:
    properties:
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      university:
        type: string
    type: object
  dto.UserGrowthResponseDTO:
    properties:
      newUsers:
        type: integer
      period:
        type: string
      totalUsers:
        type: integer
    type: object
  dto.UserInfo:
    properties:
      email:
        type: string
      id:
        type: integer
      institusi:
        type: string
      jenjang:
        type: string
      name:
        type: string
      phone:
        type: string
    type: object
  dto.UserResponseDTO:
    properties:
      birth_date:
        type: string
      data_has_verified:
        type: boolean
      dokumen_filename:
        type: string
      email:
        type: string
      id:
        type: integer
      institusi:
        type: string
      major:
        type: string
      name:
        type: string
      nim:
        type: string
      phone:
        type: string
      profile_has_updated:
        type: boolean
      profile_picture:
        type: string
      role:
        type: string
      socmed_document:
        type: string
    type: object
  dto.ValidateGoogleIdTokenDTO:
    properties:
      google_id_token:
        type: string
    required:
    - google_id_token
    type: object
  entity.HackathonTeam:
    properties:
      createdAt:
        type: string
      githubProjectUrl:
        type: string
      id_HackathonTeam:
        type: integer
      idteam:
        format: int64
        type: integer
      isDeleted:
        type: boolean
      pitchDeckUrl:
        type: string
      proposalUrl:
        type: string
      stage:
        type: string
      status:
        type: string
      team:
        $ref: '#/definitions/entity.Team'
      updatedAt:
        type: string
    type: object
  entity.NewsLetter:
    properties:
      base_image:
        type: string
      created_at:
        type: string
      id_admin:
        type: integer
      id_news_letter:
        type: integer
      news_letter:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
  entity.Team:
    properties:
      createdAt:
        type: string
      event:
        type: string
      id_LeadTeam:
        type: integer
      id_Team:
        type: integer
      joinCode:
        type: string
      komitmenFee:
        type: string
      supervisor:
        type: string
      supervisorNIDN:
        type: string
      teamName:
        type: string
