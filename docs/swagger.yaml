        type: string
    type: object
  helper.Response:
    properties:
      data: {}
      errors: {}
      message:
        type: string
      success:
        type: boolean
    type: object
host: localhost:8000
info:
  contact: {}
  description: This is a sample server for GCW API.
  title: GCW API
  version: "1.0"
paths:
  /admin/users:
    get:
      consumes:
      - application/json
      description: Get all users with pagination, filtering, and sorting for admin
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Start date (YYYY-MM-DD)
        in: query
        name: startDate
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: endDate
        type: string
      - description: Search query
        in: query
        name: q
        type: string
      - description: Sort field
        enum:
        - id
        - institusi
        - id_team
        - nim
        - soc_med_document
        - profile_has_updated
        - data_has_verified
        in: query
        name: sortBy
        type: string
      - description: Sort order
        enum:
        - ASC
        - DESC
        in: query
        name: sortOrder
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminUsersListResponseDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "403":
          description: Forbidden
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Get All Users (Admin)
      tags:
      - Admin Users
  /admin/users/{id}:
    delete:
      description: Delete a user by ID (admin only)
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Delete User (Admin)
      tags:
      - Admin Users
    get:
      description: Get a single user by ID for admin
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminUserResponseDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Get User by ID (Admin)
      tags:
      - Admin Users
    put:
      consumes:
      - application/json
      description: Update an existing user by admin
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update User Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.AdminUpdateUserDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AdminUserResponseDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "404":
          description: Not Found
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Update User (Admin)
      tags:
      - Admin Users
  /admin/users/analytics/growth:
    get:
      consumes:
      - application/json
      description: Get user growth analytics between two dates
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: startDate
        required: true
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: endDate
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/dto.UserGrowthResponseDTO'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Get User Growth Analytics (Admin)
      tags:
      - Admin Users
  /auth/login:
    post:
      consumes:
      - application/json
      description: Login with email and password to get access token
      parameters:
      - description: Login Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.LoginDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponseDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
      summary: Login
      tags:
      - Auth
  /auth/refresh-token:
    post:
      consumes:
      - application/json
      description: Refresh Token
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RefreshTokenDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponseDTO'
              type: object
      summary: Refresh Token
      tags:
      - Auth
  /auth/registration:
    post:
      consumes:
      - application/json
      description: Register a new user account with email, password, and name
      parameters:
      - description: Register Payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.RegisterDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponseDTO'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/helper.Response'
      summary: Register new account
      tags:
      - Auth
  /auth/validate-google-id-token:
    post:
      consumes:
      - application/json
      description: Validate Google ID Token (Login)
      parameters:
      - description: Google ID Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/dto.ValidateGoogleIdTokenDTO'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.AuthResponseDTO'
              type: object
      summary: Validate Google ID Token
      tags:
      - Auth
  /cp/{join_code}:
    get:
      consumes:
      - application/json
      description: Get CP details by join code
      parameters:
      - description: Join Code
        in: path
        name: join_code
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  $ref: '#/definitions/dto.CpDetailDto'
              type: object
        "400":
          description: Invalid join code
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "404":
          description: CP details not found
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "500":
          description: Internal server error
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Get CP Details
      tags:
      - CP
  /dashboard/{acara}/{count}/{page}:
    get:
      consumes:
      - application/json
      description: Retrieve all dashboard data based on the specified event type (seminar,
        hackaton, cp).
      parameters:
      - description: Event type (seminar, hackaton, cp)
        in: path
        name: acara
        required: true
        type: string
      - description: Number of items per page
        in: path
        name: count
        required: true
        type: integer
      - description: Page number
        in: path
        name: page
        required: true
        type: integer
      - description: Search by id_tiket, name, or email
        in: query
        name: search
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data: {}
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                message:
                  type: string
              type: object
      summary: Get All Dashboard
      tags:
      - Dashboard
  /dashboard/{acara}/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a specific dashboard event based on the event type and ID.
      parameters:
      - description: Event type (seminar, hackaton, cp)
        in: path
        name: acara
        required: true
        type: string
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                message:
                  type: string
              type: object
      summary: Delete Dashboard Event
      tags:
      - Dashboard
    put:
      consumes:
      - application/json
      description: Update a specific dashboard event based on the event type and ID.
      parameters:
      - description: Event type (seminar, hackaton, cp)
        in: path
        name: acara
        required: true
        type: string
      - description: Event ID
        in: path
        name: id
        required: true
        type: string
      - description: Event data to update
        in: body
        name: request
        required: true
        schema: {}
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                data:
                  type: string
              type: object
        "400":
          description: Bad Request
          schema:
            allOf:
            - $ref: '#/definitions/helper.Response'
            - properties:
                message:
                  type: string
              type: object
        "500":
